<!DOCTYPE html>

  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#070605;color:#F2F0EC;font-family:'Poppins',sans-serif;min-height:100vh}
    body{display:flex;align-items:center;justify-content:center;padding:clamp(24px,4vw,48px);background:radial-gradient(900px 520px at 78% -10%,rgba(230,59,22,.32),transparent 60%),radial-gradient(640px 380px at -4% 30%,rgba(230,59,22,.10),transparent 60%),#070605}
    .wrap{max-width:880px;width:100%;display:flex;flex-direction:column;gap:48px;align-items:flex-start}
    .brand{font-family:'Funnel Display',sans-serif;font-weight:800;font-size:clamp(28px,4vw,40px);letter-spacing:-.02em}
    .brand span{color:#E63B16}
    .badge{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#FF6A3D;border:1px solid rgba(230,59,22,.4);border-radius:999px;padding:7px 14px;background:rgba(11,10,9,.4)}
    .dot{width:6px;height:6px;border-radius:50%;background:#FF6A3D;animation:blink 1.4s step-end infinite}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    h1{font-family:'Funnel Display',sans-serif;font-weight:800;font-size:clamp(48px,8vw,108px);line-height:.92;letter-spacing:-.03em;margin:0;text-transform:uppercase;max-width:760px}
    h1 span{color:#E63B16}
    p.lead{max-width:560px;font-size:clamp(15px,1.7vw,19px);line-height:1.55;color:#B7B1A9;margin:0}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;width:100%}
    a.card{position:relative;display:flex;flex-direction:column;gap:12px;padding:28px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.02);text-decoration:none;color:#F2F0EC;transition:border-color .35s,background .35s,transform .35s cubic-bezier(.16,1,.3,1)}
    a.card:hover{border-color:rgba(230,59,22,.55);background:rgba(230,59,22,.06);transform:translateY(-4px)}
    .num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:#8A847C;text-transform:uppercase}
    .card h2{font-family:'Funnel Display',sans-serif;font-weight:700;font-size:26px;margin:0;line-height:1.05}
    .card p{font-size:14px;line-height:1.55;color:#B7B1A9;margin:0}
    .arrow{position:absolute;top:24px;right:24px;font-size:22px;color:#E63B16}
  </style>
</head>
