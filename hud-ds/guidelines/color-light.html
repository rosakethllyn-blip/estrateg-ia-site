<!-- @dsCard group="Colors" viewport="700x150" subtitle="The white folds — warm cream surfaces" name="Light surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}body{margin:0;overflow:hidden;font-family:var(--font-body);background:#cfcac3;padding:20px;display:flex;gap:14px}
.s{flex:1;border-radius:12px;height:108px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#14110F;border:1px solid var(--line-on-light)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.h{font-family:var(--font-mono);font-size:11px;color:var(--on-light-subtle)}</style></head>
<body>
<div class="s" style="background:var(--paper)"><div class="n">paper</div><div class="h">#F4F2EF</div></div>
<div class="s" style="background:var(--paper-warm)"><div class="n">paper-warm</div><div class="h">#EFECE7</div></div>
<div class="s" style="background:var(--paper-card)"><div class="n">paper-card</div><div class="h">#FFFFFF</div></div>
<div class="s" style="background:var(--paper-tint)"><div class="n">paper-tint</div><div class="h">#FFEDE6</div></div>
</body></html>
