<!-- @dsCard group="Colors" viewport="700x150" subtitle="The black folds — near-black surfaces" name="Dark surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}body{margin:0;overflow:hidden;font-family:var(--font-body);background:#000;padding:20px;display:flex;gap:14px}
.s{flex:1;border-radius:12px;height:108px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#F2F0EC;border:1px solid var(--line-on-dark)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.h{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-subtle)}</style></head>
<body>
<div class="s" style="background:var(--ink-900)"><div class="n">ink-900</div><div class="h">#070605</div></div>
<div class="s" style="background:var(--ink-800)"><div class="n">ink-800</div><div class="h">#0B0A09</div></div>
<div class="s" style="background:var(--ink-700)"><div class="n">ink-700</div><div class="h">#0E0C0B</div></div>
<div class="s" style="background:var(--ink-card)"><div class="n">ink-card</div><div class="h">#141210</div></div>
<div class="s" style="background:var(--ink-card-2)"><div class="n">ink-card-2</div><div class="h">#15110E</div></div>
</body></html>
