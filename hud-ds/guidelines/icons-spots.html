<!-- @dsCard group="Resources" viewport="760x300" subtitle="Iconografia de traço e o spot ✦ da marca" name="Icons & Spots" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);color:var(--on-dark-soft);padding:40px}
.row{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:26px}
.ic{width:64px;height:64px;border-radius:var(--radius-sm);border:1px solid var(--line-on-dark);background:var(--ink-card);display:flex;align-items:center;justify-content:center;color:var(--on-dark-soft)}
.spots{display:flex;gap:26px;align-items:center}
.spot{font-size:30px;color:var(--brand)}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dark-subtle);margin-bottom:14px}
.arrows{font-family:var(--font-mono);font-size:22px;color:var(--brand-bright)}
</style></head>
<body>
<div class="lab">Ícones · traço 2px, cantos vivos</div>
<div class="row">
  <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></div>
  <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
  <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9l8-5 8 5v10"/><path d="M9 19v-6h6v6"/></svg></div>
  <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/></svg></div>
  <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg></div>
  <div class="ic" style="color:var(--brand-bright)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg></div>
</div>
<div class="lab">Spots — separadores e marcadores</div>
<div class="spots"><span class="spot">✦</span><span class="arrows">&gt;&gt;&gt;</span><span style="font-family:var(--font-mono);color:var(--brand-bright);letter-spacing:.2em">[ 01 ]</span><span style="font-family:var(--font-mono);color:var(--on-dark-subtle)">·</span></div>
</body></html>
