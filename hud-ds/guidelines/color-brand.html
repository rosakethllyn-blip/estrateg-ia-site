<!-- @dsCard group="Colors" viewport="700x150" subtitle="Hot orange-red — the single brand hue" name="Brand" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);padding:20px;display:flex;gap:14px}
.s{flex:1;border-radius:12px;height:108px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;border:1px solid var(--line-on-dark)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;opacity:.92}
.h{font-family:var(--font-mono);font-size:11px;opacity:.7}</style></head>
<body>
<div class="s" style="background:var(--brand)"><div class="n">brand</div><div class="h">#E63B16</div></div>
<div class="s" style="background:var(--brand-bright);color:#1a0d06"><div class="n">brand-bright</div><div class="h">#FF6A3D</div></div>
<div class="s" style="background:var(--brand-hover);color:#1a0d06"><div class="n">brand-hover</div><div class="h">#FF5A2C</div></div>
<div class="s" style="background:var(--brand-deep)"><div class="n">brand-deep</div><div class="h">#9C2A0E</div></div>
<div class="s" style="background:var(--brand-ember)"><div class="n">brand-ember</div><div class="h">#3A1206</div></div>
</body></html>
