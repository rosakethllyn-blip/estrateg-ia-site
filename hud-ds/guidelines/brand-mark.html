<!-- @dsCard group="Foundations" viewport="900x420" subtitle="Logo lockup, the [IA] bracket motif, and dobra rhythm" name="Brand mark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-900);color:var(--on-dark-soft);padding:0}
.fold{padding:36px 40px}
.dark{background:var(--ink-900)}
.light{background:var(--paper);color:var(--on-light)}
.logo{font-family:var(--font-display);font-weight:800;letter-spacing:-.02em}
.tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--on-dark-subtle);margin-bottom:14px}
.tagL{color:var(--on-light-subtle)}
.note{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-subtle);margin-top:10px}
.noteL{color:var(--on-light-subtle)}
</style></head>
<body>
<div class="fold dark">
  <div class="tag">Primary lockup · on dark</div>
  <div class="logo" style="font-size:56px">Estrateg<span style="color:var(--brand)">[IA]</span></div>
  <div class="note">The bracketed <strong style="color:var(--brand-bright)">[IA]</strong> is the core motif — reused as section labels: [ 01 ], [ DOC.04 ], [ SUA MENTORA ].</div>
</div>
<div class="fold light">
  <div class="tag tagL">On light fold</div>
  <div class="logo" style="font-size:56px;color:var(--on-light)">Estrateg<span style="color:var(--brand)">[IA]</span></div>
  <div class="note noteL">The site alternates strict dark / light "dobras" — never two of the same in a row.</div>
</div>
</body></html>
