<!-- @dsCard group="Foundations" viewport="900x360" subtitle="Base-4 rhythm, pill & card radii" name="Spacing & radius" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);color:var(--on-dark-soft);padding:40px}
h4{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--on-dark-subtle);margin:0 0 18px}
.scale{display:flex;align-items:flex-end;gap:14px;margin-bottom:44px}
.unit{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--brand);border-radius:3px;width:34px}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-subtle)}
.radii{display:flex;gap:20px}
.r{width:120px;height:80px;background:var(--ink-card);border:1px solid var(--line-on-dark);display:flex;align-items:flex-end;padding:10px}
.rl{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-subtle)}
</style></head>
<body>
<h4>Spacing — base 4</h4>
<div class="scale">
  <div class="unit"><div class="bar" style="height:4px"></div><div class="lab">1·4</div></div>
  <div class="unit"><div class="bar" style="height:8px"></div><div class="lab">2·8</div></div>
  <div class="unit"><div class="bar" style="height:16px"></div><div class="lab">4·16</div></div>
  <div class="unit"><div class="bar" style="height:24px"></div><div class="lab">5·24</div></div>
  <div class="unit"><div class="bar" style="height:32px"></div><div class="lab">6·32</div></div>
  <div class="unit"><div class="bar" style="height:48px"></div><div class="lab">8·48</div></div>
  <div class="unit"><div class="bar" style="height:64px"></div><div class="lab">9·64</div></div>
  <div class="unit"><div class="bar" style="height:80px"></div><div class="lab">10·80</div></div>
</div>
<h4>Radius</h4>
<div class="radii">
  <div class="r" style="border-radius:var(--radius-xs)"><span class="rl">xs · 12</span></div>
  <div class="r" style="border-radius:var(--radius-sm)"><span class="rl">sm · 14</span></div>
  <div class="r" style="border-radius:var(--radius-card)"><span class="rl">card · 18</span></div>
  <div class="r" style="border-radius:var(--radius-card-lg)"><span class="rl">card-lg · 22</span></div>
  <div class="r" style="border-radius:var(--radius-pill)"><span class="rl">pill · 999</span></div>
</div>
</body></html>
