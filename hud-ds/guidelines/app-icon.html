<!-- @dsCard group="Resources" viewport="760x300" subtitle="App icon e favicon — o mark da bússola/viewfinder" name="App icon & favicon" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);color:var(--on-dark-soft);padding:36px 40px}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dark-subtle);margin-bottom:16px}
.row{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.item img{width:96px;height:96px;border-radius:22px;display:block}
.glyph{width:64px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:14px}
.glyph img{width:52px;height:52px}
.cap{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dark-subtle)}
.swatch-dark{background:var(--ink-900)}
.swatch-light{background:var(--paper)}
.fav{display:flex;align-items:center;gap:12px;background:var(--ink-card);border:1px solid var(--line-on-dark);border-radius:10px;padding:9px 14px}
.fav img{width:20px;height:20px;border-radius:5px}
.fav span{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-subtle)}
</style></head>
<body>
<div class="lab">App icon — fundo escuro & claro</div>
<div class="row" style="margin-bottom:28px">
  <div class="item"><img src="../assets/icon-app-dark.png" alt="App icon escuro"><span class="cap">on dark</span></div>
  <div class="item"><img src="../assets/icon-app-light.png" alt="App icon claro"><span class="cap">on light</span></div>
  <div class="item"><div class="glyph swatch-dark"><img src="../assets/icon-mark-cream.png" alt="Mark creme"></div><span class="cap">mark creme</span></div>
  <div class="item"><div class="glyph swatch-light"><img src="../assets/icon-mark-dark.png" alt="Mark escuro"></div><span class="cap">mark escuro</span></div>
  <div class="item"><div class="fav"><img src="../assets/icon-app-dark.png" alt=""><span>aba do navegador · favicon</span></div></div>
</div>
</body></html>
