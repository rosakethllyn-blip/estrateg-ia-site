<!-- @dsCard group="Foundations" viewport="900x520" subtitle="Funnel Display · Poppins · JetBrains Mono" name="Type scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);color:var(--on-dark-soft);padding:40px}
.row{border-top:1px solid var(--line-on-dark);padding:20px 0;display:grid;grid-template-columns:130px 1fr;gap:24px;align-items:baseline}
.tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--on-dark-subtle)}
.d{font-family:var(--font-display);font-weight:800;line-height:.9;letter-spacing:-.03em;color:var(--on-dark)}
.lead{font-family:var(--font-display);font-weight:600;font-size:28px;line-height:1.2;color:#EDE8E1}
.body{font-family:var(--font-body);font-size:16px;line-height:1.6;color:var(--on-dark-muted);max-width:560px}
.mono{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--brand-bright)}
</style></head>
<body>
<div class="row"><div class="tag">Hero · 800</div><div class="d" style="font-size:72px;text-transform:uppercase">Estrateg<span style="color:var(--brand)">[IA]</span></div></div>
<div class="row"><div class="tag">Display 1 · 800</div><div class="d" style="font-size:48px">Três camadas, um ecossistema.</div></div>
<div class="row"><div class="tag">Lead · 600</div><div class="lead">A IA tira o gestor da saúde do <span style="color:var(--brand-bright)">operacional</span>.</div></div>
<div class="row"><div class="tag">Body · 400</div><div class="body">Construo agentes, frameworks e ferramentas de IA aplicada à estratégia pra você decidir, crescer e cuidar melhor dos pacientes.</div></div>
<div class="row"><div class="tag">Mono label</div><div class="mono">[ COMO FUNCIONA ]</div></div>
</body></html>
