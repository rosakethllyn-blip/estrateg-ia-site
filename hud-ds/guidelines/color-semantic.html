<!-- @dsCard group="Colors" viewport="700x150" subtitle="Functional hues — used sparingly, brand stays dominant" name="Semantic" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);padding:20px;display:flex;gap:14px}
.s{flex:1;border-radius:12px;height:108px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;border:1px solid var(--line-on-dark)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.h{font-family:var(--font-mono);font-size:11px;opacity:.75}</style></head>
<body>
<div class="s" style="background:var(--success)"><div class="n">success</div><div class="h">#1F8A5B</div></div>
<div class="s" style="background:var(--warning);color:#241a05"><div class="n">warning</div><div class="h">#E0A33A</div></div>
<div class="s" style="background:var(--danger)"><div class="n">danger</div><div class="h">#D7382B</div></div>
<div class="s" style="background:var(--info)"><div class="n">info</div><div class="h">#2A6FDB</div></div>
<div class="s" style="background:var(--purple)"><div class="n">purple</div><div class="h">#7A4DD0</div></div>
</body></html>
