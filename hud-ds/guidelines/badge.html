<!-- @dsCard group="Components" viewport="760x260" subtitle="Bracket labels & pill badges — the technical voice" name="Bracket label & badge" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
html,body{scrollbar-width:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
body{margin:0;overflow:hidden;font-family:var(--font-body);background:var(--ink-800);padding:44px;display:flex;flex-direction:column;gap:30px;align-items:flex-start}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--on-dark-subtle)}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.bracket{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--brand-bright)}
.bracket-mut{color:var(--on-dark-subtle)}
.pill{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand-bright);border:1px solid rgba(230,59,22,.4);border-radius:var(--radius-pill);padding:8px 16px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--brand-bright);animation:scia-pulse 1.8s infinite}
.tag{display:inline-flex;align-items:center;padding:6px 11px;border:1px solid rgba(230,59,22,.4);border-radius:var(--radius-pill);font-size:12px;color:#F4EFEA;background:rgba(230,59,22,.1)}
.hot{position:relative;background:var(--brand);color:#fff;font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:6px 12px;border-radius:var(--radius-pill)}
</style></head>
<body>
<span class="lab">Section bracket labels</span>
<div class="row"><span class="bracket">[ COMO FUNCIONA ]</span><span class="bracket bracket-mut">[ 01 ]</span><span class="bracket bracket-mut">[ DOC.04 ]</span></div>
<span class="lab">Status pill (live dot)</span>
<div class="row"><span class="pill"><span class="dot"></span>IA aplicada · gestão em saúde</span></div>
<span class="lab">Chip & "hot" badge</span>
<div class="row"><span class="tag">Dashboards</span><span class="tag">Gestor de CCIH</span><span class="hot">Mais procurado</span></div>
</body></html>
